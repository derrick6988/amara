version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  amara:
    build: .
    container_name: amara-bot
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_URL=http://ollama:11434
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      ollama:
        condition: service_healthy
    stdin_open: true
    tty: true
    networks:
      - amara-network

  # Uncomment to use OpenAI instead of Ollama:
  # amara:
  #   build: .
  #   container_name: amara-bot
  #   environment:
  #     - LLM_PROVIDER=openai
  #     - LLM_MODEL=gpt-4o-mini
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #     - GITHUB_TOKEN=${GITHUB_TOKEN:-}
  #   stdin_open: true
  #   tty: true
  #   networks:
  #     - amara-network

volumes:
  ollama_data:

networks:
  amara-network:
    driver: bridge
